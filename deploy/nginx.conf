# /etc/nginx/sites-available/ai-tasks
#
# Replace tasks.example.com with your real domain in all 3 places below,
# then:   sudo ln -s /etc/nginx/sites-available/ai-tasks /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx
#
# --- Cloudflare note ----------------------------------------------
# If Cloudflare is proxying this origin, set SSL/TLS mode to "Full (strict)"
# in the Cloudflare dashboard so traffic is encrypted end-to-end. Let's
# Encrypt with certbot below gives you a real cert the origin can present.
# If instead you use Cloudflare Tunnel (cloudflared), you can skip the
# listen 443 ssl block and keep only the plain http server on 127.0.0.1.
# ------------------------------------------------------------------

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tasks.example.com;

    # Certbot http-01 challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tasks.example.com;

    # Managed by certbot after first run (see DEPLOY.md).
    ssl_certificate     /etc/letsencrypt/live/tasks.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tasks.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Real client IP if behind Cloudflare — add `set_real_ip_from` ranges from
    # https://www.cloudflare.com/ips/ and uncomment:
    # real_ip_header CF-Connecting-IP;
    # set_real_ip_from 173.245.48.0/20;
    # ... (see Cloudflare IP list)

    # Generous upload size for attachments / documents
    client_max_body_size 50m;

    # --- Service worker: NEVER cache -----------------------------------
    # Web Push relies on /sw.js being fresh after every deploy.
    location = /sw.js {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- User-uploaded files --------------------------------------
    # The app writes attachments to /srv/ai-tasks/uploads; Nginx serves
    # them directly (no Node round-trip). The app stores filePath as
    # "/uploads/tasks/<filename>" — that path resolves here.
    location /uploads/ {
        alias /srv/ai-tasks/uploads/;
        # Allow browsers to cache for a week (files are content-addressed by uuid)
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        # Force safe download for potentially-risky mimetypes
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # --- Next.js build output: long cache -------------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1y;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # --- Everything else: reverse-proxy to Next.js ----------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streamed AI responses: disable buffering + long timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Security headers (tune as needed)
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"   always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
}
