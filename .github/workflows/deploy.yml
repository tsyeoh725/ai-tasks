name: Deploy

on:
  push:
    branches: [main]

# Self-hosted runner lives on talos as the `aitasks` user.
# `aitasks` has NOPASSWD sudo for `/usr/local/bin/aitasks-update`,
# so the entire deploy is one line. The script handles git pull,
# DB backup, npm ci, drizzle push, build, restart, smoke test.

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Run aitasks-update
        run: sudo /usr/local/bin/aitasks-update
