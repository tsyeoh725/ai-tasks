# ai-tasks — production stack on the server.
# Pulls the prebuilt image from GHCR; never builds on the server.
#
# Update flow:
#   docker compose pull && docker compose up -d
# (or just push to main — GitHub Actions does this for you)

services:
  app:
    image: ghcr.io/tsyeoh725/ai-tasks:latest
    container_name: ai-tasks
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"   # localhost-only; Cloudflare Tunnel forwards to here
    env_file:
      - .env.production
    environment:
      # Container-level timezone. Without this, Node sees UTC inside Docker
      # and Intl.DateTimeFormat() with no explicit zone returns UTC — which
      # makes the Jarvis date parser fall back to UTC for users without a
      # saved timezone preference, storing "5 PM" as 17:00 UTC = 1 AM MYT.
      # MYT matches the deployment location and the bulk of users;
      # per-user override still wins via userPreferences.timezone.
      TZ: Asia/Kuala_Lumpur
    volumes:
      - ./data:/data            # SQLite DB + uploads — survives image swaps
    healthcheck:
      # SL-10: must hit /api/diag/health (which actually queries SQLite).
      # The previous /api/auth/session passed even when the DB was corrupt
      # because NextAuth returns {} for an empty session without a DB query.
      test: ["CMD", "curl", "-fsS", "http://localhost:3100/api/diag/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
